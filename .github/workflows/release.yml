name: Release

on:
    push:
        tags:
            - "v*" # triggers on tags like v1.0.0, v1.2.3

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      rid: linux-x64
                      artifact: TodoApp-linux-x64
                    - os: windows-latest
                      rid: win-x64
                      artifact: TodoApp-win-x64

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Restore
              run: dotnet restore RootCause.App/RootCause.App.csproj

            - name: Publish
              run: |
                  dotnet publish RootCause.App/RootCause.App.csproj \
                  -c Release \
                  -r ${{ matrix.rid }} \
                  --self-contained true \
                  -p:PublishSingleFile=true \
                  -p:IncludeNativeLibrariesForSelfExtract=true \
                  -o publish/${{ matrix.rid }}

            - name: Zip (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  cd publish/${{ matrix.rid }}
                  zip -r ../../${{ matrix.artifact }}.zip .

            - name: Zip (Windows)
              if: matrix.os == 'windows-latest'
              run: |
                  Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ${{ matrix.artifact }}.zip
              shell: pwsh

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}.zip

    release:
        needs: build
        runs-on: ubuntu-latest

        permissions:
            contents: write # needed to create the GitHub release

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: artifacts/**/*.zip
